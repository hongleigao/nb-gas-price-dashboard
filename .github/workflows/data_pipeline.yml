name: NB Gas Pulse - Daily ETL

on:
  schedule:
    - cron: '30 2 * * *'   # ADT 23:30 / AST 22:30 (每日收盘核心同步)
    - cron: '30 11 * * *'  # ADT 08:30 / AST 07:30 (早晨容灾兜底)
  workflow_dispatch:         # 保留手动触发按钮

jobs:
  data-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run ETL & Push to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python scripts/update_daily.py --remote