name: Update Gas Data Daily

# 触发器配置
on:
  schedule:
    - cron: '0 8 * * *' # 每天 UTC 时间早上 8 点（AST 大约凌晨 4/5 点）自动运行一次
  workflow_dispatch: # 允许你在 GitHub 网页上通过点击按钮手动触发运行

# 权限配置（必须开启，否则机器人无法把生成的 JSON 提交到仓库）
permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance xlrd openpyxl

      - name: Run ETL Script
        run: python update_data.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          # 如果 data.json 没有发生变化，就不提交，避免报错退出
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data.json" && git push)
