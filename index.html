<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NB Gas Pulse - 纽省油价预测</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --primary: #00ff88;
            --danger: #ff4466;
            --text: #e0e0e6;
            --text-dim: #9090a0;
            --border: #2a2a32;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.5; overflow-x: hidden;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .brand { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; color: var(--primary); }
        .status-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 10px var(--primary); }
        .sync-time { font-size: 0.75rem; color: var(--text-dim); }

        /* Hero Decision Area */
        .hero { 
            background: linear-gradient(145deg, var(--surface), var(--bg));
            border: 1px solid var(--border); border-radius: 24px; padding: 30px;
            text-align: center; margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .prediction-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 10px; }
        .price-change { font-size: 4rem; font-weight: 900; line-height: 1; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .unit { font-size: 1.2rem; margin-left: 4px; vertical-align: middle; opacity: 0.6; }
        
        /* Pressure Gauge (市场压力表) */
        .pressure-gauge { margin-top: 25px; padding-top: 20px; border-top: 1px border var(--border); }
        .gauge-track { height: 6px; background: #222; border-radius: 3px; position: relative; margin: 15px 0; }
        .gauge-fill { height: 100%; border-radius: 3px; position: absolute; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .gauge-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .impact-val { color: var(--text); font-weight: bold; margin-left: 4px; }

        /* Window Breakdown */
        .section-title { font-size: 0.85rem; font-weight: 700; color: var(--text-dim); margin: 30px 0 15px 5px; text-transform: uppercase; letter-spacing: 1px; }
        .window-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .window-day { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 5px; text-align: center; transition: transform 0.2s;
        }
        .day-name { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 6px; }
        .day-price { font-size: 0.85rem; font-weight: bold; }
        .day-final { width: 4px; height: 4px; background: var(--primary); border-radius: 50%; margin: 6px auto 0; opacity: 0; }
        .is-final .day-final { opacity: 1; }

        /* Chart Area */
        .chart-container { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px; 
            padding: 15px; margin-top: 20px; min-height: 250px; position: relative;
        }
        canvas { width: 100% !important; height: 250px !important; }
        .chart-loading { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: var(--surface); border-radius: 20px; z-index: 10; font-size: 0.8rem; color: var(--text-dim);
        }

        /* Utils */
        .up { color: var(--danger); }
        .down { color: var(--primary); }
        .stable { color: var(--text-dim); }
        
        #debug-toggle { margin-top: 40px; font-size: 0.7rem; color: #333; text-align: center; cursor: pointer; padding: 10px; border: 1px dashed #333; border-radius: 8px; }
        #debug-panel { display: none; background: #000; color: #0f0; font-family: monospace; font-size: 0.7rem; padding: 15px; margin-top: 20px; border-radius: 12px; white-space: pre-wrap; border: 1px solid #0f0; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">GAS PULSE <small style="font-weight: 400; font-size: 0.6rem; opacity: 0.5;">V6.0</small></div>
            <div class="sync-info">
                <span class="status-dot"></span>
                <span class="sync-time" id="sync-time">SYNCING...</span>
            </div>
        </header>

        <main>
            <section class="hero">
                <div class="prediction-label">预计本周变动</div>
                <div class="price-change" id="main-change">--<span class="unit">¢/L</span></div>
                
                <div class="pressure-gauge">
                    <div class="gauge-labels">
                        <span>原油影响 <span class="impact-val" id="impact-comm">--</span></span>
                        <span>汇率影响 <span class="impact-val" id="impact-fx">--</span></span>
                    </div>
                    <div class="gauge-track">
                        <div id="gauge-bar" class="gauge-fill" style="width: 50%; left: 25%; background: var(--primary);"></div>
                    </div>
                    <div style="font-size: 0.6rem; color: #444; margin-top: 10px;">市场压力平衡表 (相对于上周基准)</div>
                </div>
            </section>

            <section>
                <div class="section-title">5日计价窗口明细</div>
                <div class="window-list" id="window-list">
                    <!-- JS 填充 -->
                    <div class="window-day"><div class="day-name">--</div><div class="day-price">--</div></div>
                    <div class="window-day"><div class="day-name">--</div><div class="day-price">--</div></div>
                    <div class="window-day"><div class="day-name">--</div><div class="day-price">--</div></div>
                    <div class="window-day"><div class="day-name">--</div><div class="day-price">--</div></div>
                    <div class="window-day"><div class="day-name">--</div><div class="day-price">--</div></div>
                </div>
            </section>

            <section class="chart-container">
                <div class="chart-loading" id="chart-loader">加载历史趋势中...</div>
                <canvas id="historyChart"></canvas>
            </section>
        </main>

        <div id="debug-toggle">DEBUG MODE OFF</div>
        <div id="debug-panel">Waiting for data...</div>
    </div>

    <script>
        const APP_VERSION = "6.0.3";
        // V6.0 生产环境指向：显式指定 Cloudflare Worker 地址
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
            ? 'http://localhost:8787' 
            : 'https://nb-gas-pulse-api.honglei-gao.workers.dev';

        async function init() {
            console.log(`[NB Gas Pulse] Version: ${APP_VERSION}`);
            console.log(`[NB Gas Pulse] API Target: ${API_BASE || "Relative"}`);
            // 1. 先加载最新预测 (核心数据)
            await fetchLatest();
            // 2. 异步加载图表 (耗时数据)
            await fetchHistory();
        }

        async function fetchLatest() {
            try {
                const res = await fetch(`${API_BASE}/api/latest`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                renderLatest(data);
            } catch (e) {
                console.error("Fetch Latest Error:", e);
                document.getElementById('main-change').innerText = 'ERROR';
            }
        }

        function renderLatest(data) {
            const p = data.prediction;
            const changeEl = document.getElementById('main-change');
            
            // 1. 调试信息渲染
            const debugPanel = document.getElementById('debug-panel');
            debugPanel.innerText = JSON.stringify(data.metadata.debug, null, 2);

            // 2. 主预测值
            const sign = p.change > 0 ? '+' : '';
            changeEl.innerText = `${sign}${p.change.toFixed(1)}`;
            changeEl.innerHTML += `<span class="unit">¢/L</span>`;
            changeEl.className = `price-change ${p.direction}`;

            // 3. 压力表
            document.getElementById('sync-time').innerText = new Date(data.metadata.last_sync).toLocaleTimeString();
            document.getElementById('impact-comm').innerText = `${p.spot_attribution.commodity > 0 ? '+' : ''}${p.spot_attribution.commodity}¢`;
            document.getElementById('impact-fx').innerText = `${p.spot_attribution.fx > 0 ? '+' : ''}${p.spot_attribution.fx}¢`;
            
            const totalAbs = Math.abs(p.spot_attribution.commodity) + Math.abs(p.spot_attribution.fx);
            const commRatio = totalAbs > 0 ? (Math.abs(p.spot_attribution.commodity) / totalAbs) * 100 : 50;
            const bar = document.getElementById('gauge-bar');
            bar.style.width = `${commRatio}%`;
            bar.style.background = p.spot_attribution.commodity > 0 ? 'var(--danger)' : 'var(--primary)';

            // 4. 窗口列表
            const list = document.getElementById('window-list');
            list.innerHTML = p.window.breakdown.map(d => `
                <div class="window-day ${d.is_final ? 'is-final' : ''}">
                    <div class="day-name">${d.day}</div>
                    <div class="day-price">${d.raw_market ? (d.raw_market * 100).toFixed(1) : '--'}</div>
                    <div class="day-final"></div>
                </div>
            `).join('');
        }

        async function fetchHistory() {
            try {
                const res = await fetch(`${API_BASE}/api/history`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                renderChart(data);
                document.getElementById('chart-loader').style.display = 'none';
            } catch (e) {
                console.error("Fetch History Error:", e);
                document.getElementById('chart-loader').innerText = '图表加载失败';
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('historyChart').getContext('2d');
            const nymex_cents = data.nymex_prices.map(v => v * 100);
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.dates,
                    datasets: [
                        {
                            label: 'NB 官方价格',
                            data: data.nb_prices,
                            borderColor: '#00ff88',
                            borderWidth: 3,
                            stepped: true,
                            pointRadius: 0
                        },
                        {
                            label: 'NYMEX 市场基准 (c/L)',
                            data: nymex_cents,
                            borderColor: 'rgba(255, 255, 255, 0.15)',
                            borderWidth: 1.5,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    scales: {
                        y: { 
                            grid: { color: '#222' },
                            ticks: { color: '#666', font: { size: 10 } }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#666', font: { size: 10 }, maxRotation: 0 }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Debug Toggle Logic
        document.getElementById('debug-toggle').onclick = () => {
            const panel = document.getElementById('debug-panel');
            const toggle = document.getElementById('debug-toggle');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                toggle.innerText = 'DEBUG MODE OFF';
            } else {
                panel.style.display = 'block';
                toggle.innerText = 'DEBUG MODE ON';
            }
        };

        init();
    </script>
</body>
</html>
